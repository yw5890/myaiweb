<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>안녕하세요 👋</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Segoe UI', sans-serif;
      background: linear-gradient(135deg, #667eea, #764ba2);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    .card {
      background: white;
      border-radius: 20px;
      padding: 48px 40px;
      max-width: 480px;
      width: 100%;
      text-align: center;
      box-shadow: 0 20px 60px rgba(0,0,0,0.2);
    }
    .avatar { font-size: 64px; margin-bottom: 16px; }
    h1 { font-size: 28px; color: #1a1a2e; margin-bottom: 8px; }
    .subtitle { color: #667eea; font-size: 15px; font-weight: 600; margin-bottom: 20px; }
    p { color: #555; line-height: 1.7; font-size: 15px; margin-bottom: 28px; }
    .badge {
      display: inline-block;
      background: #f0f0ff;
      color: #667eea;
      border-radius: 20px;
      padding: 6px 14px;
      font-size: 13px;
      margin: 4px;
    }
    .footer { margin-top: 32px; color: #aaa; font-size: 13px; }
  </style>
</head>
<body>
  <div class="card">
    <div class="avatar">🤖</div>
    <h1>안녕하세요!</h1>
    <p class="subtitle">AI Web Developer</p>
    <p>Claude와 함께 AI 기반 웹 개발을 공부하고 있습니다.<br>작은 아이디어를 코드로 만드는 과정을 즐기고 있어요.</p>
    <div>
      <span class="badge">⚡ React</span>
      <span class="badge">🤖 AI Tools</span>
      <span class="badge">🌐 Web Dev</span>
      <span class="badge">🛠️ GitHub</span>
    </div>
    <div class="footer">✨ Powered by Claude Code</div>
  </div>
</body>
</html>
